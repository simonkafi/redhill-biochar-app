<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redhill Biochar Field App</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#2d4a1e;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#2d4a1e;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#3f662b;
}

.syncStatus{
font-size:12px;
color:#666;
}

</style>

</head>

<body>

<header>
<h2>Redhill Biochar Field Data</h2>
</header>

<div class="container">

<div class="card">

<h3>Register Farmer</h3>

<input id="farmerName" placeholder="Farmer Name">
<input id="farmerPhone" placeholder="Phone">
<input id="farmerCounty" placeholder="County">
<input id="farmerSubcounty" placeholder="Sub County">
<input id="farmerWard" placeholder="Ward">

<input id="totalAcres" placeholder="Total Acres">

<button onclick="registerFarmer()">Save Farmer</button>

</div>


<div class="card">

<h3>Record Biomass Collection</h3>

<input id="farmerId" placeholder="Farmer ID">
<input id="wasteType" placeholder="Waste Type">
<input id="weightKg" placeholder="Weight (kg)">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="saveCollection()">Save Collection</button>

</div>


<div class="card">

<h3>Sync</h3>

<button onclick="syncData()">Sync Now</button>

<div id="syncStatus" class="syncStatus"></div>

</div>

</div>



<script>


/* ====================================================
API ENDPOINT
==================================================== */

const API_URL = "https://script.google.com/macros/s/AKfycbw4qqkAG2AjHeg3JZNl-gAAZa50YWwSb_HhhhGDWvRQu8JKEv0xMTpA2a3n1oKR43oW/exec"



/* ====================================================
LOCAL STORAGE
==================================================== */

function loadData(key){

try{

let raw = localStorage.getItem(key)

if(!raw) return []

return JSON.parse(raw)

}catch(e){

console.error(e)

return []

}

}



function saveData(key,data){

localStorage.setItem(key,JSON.stringify(data))

}



/* ====================================================
ID GENERATOR
==================================================== */

function generateId(prefix){

return prefix+"_"+crypto.randomUUID()

}



/* ====================================================
VALIDATION
==================================================== */

function validateFarmer(d){

if(!d.name || d.name.length<2)
throw "Farmer name required"

if(!d.phone)
throw "Phone required"

}



function validateCollection(d){

if(!d.farmerId)
throw "Farmer ID required"

if(!d.weightKg || d.weightKg<=0)
throw "Invalid weight"

}



/* ====================================================
SAVE FARMER
==================================================== */

function registerFarmer(){

try{

const farmer = {

id:generateId("FARMER"),

timestamp:new Date().toISOString(),

name:document.getElementById("farmerName").value,

phone:document.getElementById("farmerPhone").value,

county:document.getElementById("farmerCounty").value,

subcounty:document.getElementById("farmerSubcounty").value,

ward:document.getElementById("farmerWard").value,

totalAcres:document.getElementById("totalAcres").value,

syncStatus:"pending",

syncAttempts:0

}

validateFarmer(farmer)

let farmers = loadData("rh_farmers")

farmers.push(farmer)

saveData("rh_farmers",farmers)

alert("Farmer saved")

}catch(e){

alert(e)

}

}



/* ====================================================
SAVE COLLECTION
==================================================== */

function saveCollection(){

try{

const rec = {

id:generateId("COLL"),

timestamp:new Date().toISOString(),

farmerId:document.getElementById("farmerId").value,

wasteType:document.getElementById("wasteType").value,

weightKg:Number(document.getElementById("weightKg").value),

notes:document.getElementById("notes").value,

syncStatus:"pending",

syncAttempts:0

}

validateCollection(rec)

let cols = loadData("rh_collections")

cols.push(rec)

saveData("rh_collections",cols)

alert("Collection saved")

}catch(e){

alert(e)

}

}



/* ====================================================
SEND TO SERVER
==================================================== */

async function sendToServer(type,data){

try{

let res = await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
type:type,
data:data
})

})

let json = await res.json()

return json

}catch(e){

return {success:false,error:e}

}

}



/* ====================================================
SYNC FARMERS
==================================================== */

async function syncFarmers(){

let farmers = loadData("rh_farmers")

for(let f of farmers){

if(f.syncStatus==="synced") continue

if(f.syncAttempts>=3) continue

f.syncStatus="syncing"

let res = await sendToServer("farmer",f)

if(res.success){

f.syncStatus="synced"

}else{

f.syncStatus="failed"
f.syncAttempts++

}

}

saveData("rh_farmers",farmers)

}



/* ====================================================
SYNC COLLECTIONS
==================================================== */

async function syncCollections(){

let cols = loadData("rh_collections")

for(let c of cols){

if(c.syncStatus==="synced") continue

if(c.syncAttempts>=3) continue

c.syncStatus="syncing"

let res = await sendToServer("collection",c)

if(res.success){

c.syncStatus="synced"

}else{

c.syncStatus="failed"
c.syncAttempts++

}

}

saveData("rh_collections",cols)

}



/* ====================================================
SYNC ENGINE
==================================================== */

async function syncData(){

document.getElementById("syncStatus").innerText="Syncing..."

await syncFarmers()

await syncCollections()

document.getElementById("syncStatus").innerText="Sync completed"

}



/* ====================================================
AUTO SYNC WHEN ONLINE
==================================================== */

window.addEventListener("online",()=>{

syncData()

})



</script>

</body>
</html>
